version: "3.8"

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://db:5432/ecommerce_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # Must be >= 32 bytes for HS256 (jjwt requirement)
      JWT_EXPIRATION: 86400000
      JWT_SECRET: your-super-secret-key-at-least-32-bytes-long-for-hs256-algorithm
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    depends_on:
      - backend

volumes:
  postgres_data: