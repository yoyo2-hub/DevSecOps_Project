apiVersion: v1
kind: Service
metadata:
  name: devsecops-service
spec:
  type: NodePort
  selector:
    app: devsecops-app
  ports:
  - name: frontend
    protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
  - name: backend
    protocol: TCP
    port: 8082
    targetPort: 8082
    nodePort: 30082