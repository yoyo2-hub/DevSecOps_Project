name: Trivy Docker Image Scan

on:
  push:
    branches:
      - '**'

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ecommerce-app ./frontend

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ecommerce-app'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'