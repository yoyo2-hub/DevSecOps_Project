name: K8s Deploy - TSK 2.3 & 2.4
on:
  push:
    branches:
      - dev
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      run: |
        docker build -t kammounab/devsecops-backend:latest ./backend
        docker push kammounab/devsecops-backend:latest

    - name: Build and push frontend
      run: |
        docker build -t kammounab/devsecops-frontend:latest ./frontend
        docker push kammounab/devsecops-frontend:latest

    - name: Build and push ml_backend
      run: |
        docker build -t kammounab/devsecops-ml:latest ./ml_backend
        docker push kammounab/devsecops-ml:latest

    - name: Setup Minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: docker

    - name: Configure K8s context
      run: kubectl get nodes

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    - name: Verify app running
      run: |
        kubectl rollout status deployment/devsecops-app --timeout=120s
        kubectl get pods
        kubectl get services