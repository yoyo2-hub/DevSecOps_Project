name: OWASP Dependency Check

on:
  push:
    branches:
      - '**'

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Ecommerce'
          path: './frontend'
          format: 'HTML'